<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>豪门贵足养生馆 - 记账管理</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Login Screen -->
    <section id="login-screen" class="active">
        <div class="login-container">
            <div class="login-box">
                <h1>🏪 豪门贵足养生馆</h1>
                <h2>记账管理系统</h2>
                <p class="subtitle">Lucky Feet Health Center Ltd.</p>
                <form id="login-form">
                    <div class="form-group">
                        <label for="password">请输入密码</label>
                        <input type="password" id="password" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn-primary">登录</button>
                    <p id="login-error" class="error-message" style="display:none;">密码错误，请重试</p>
                </form>
            </div>
        </div>
    </section>

    <!-- Main App (hidden until login) -->
    <section id="main-app" class="tab-content" style="display:none;">
        <nav class="navbar">
            <div class="nav-brand">🏪 豪门贵足养生馆 - 记账管理</div>
            <div class="nav-links">
                <a href="#" class="nav-link active" data-tab="dashboard">仪表盘</a>
                <a href="#" class="nav-link" data-tab="transactions">交易记录</a>
                <a href="#" class="nav-link" data-tab="add">添加交易</a>
                <a href="#" class="nav-link" data-tab="reports">统计报表</a>
                <a href="#" class="nav-link" id="logout-btn">退出</a>
            </div>
        </nav>

        <!-- Dashboard -->
        <div class="container" id="dashboard" style="display:block;">
            <h1>仪表盘</h1>
            <div class="summary-cards">
                <div class="summary-card">
                    <h3>本月收入</h3>
                    <p class="amount income" id="month-income">$0.00</p>
                </div>
                <div class="summary-card">
                    <h3>本月支出</h3>
                    <p class="amount expense" id="month-expense">$0.00</p>
                </div>
                <div class="summary-card">
                    <h3>本月结余</h3>
                    <p class="amount balance" id="month-balance">$0.00</p>
                </div>
                <div class="summary-card">
                    <h3>本月交易数</h3>
                    <p class="count" id="month-count">0</p>
                </div>
            </div>
            <div class="chart-container">
                <h2>最近交易</h2>
                <div id="recent-transactions"></div>
            </div>
        </div>

        <!-- Transactions -->
        <div class="container" id="transactions" style="display:none;">
            <h1>交易记录</h1>
            <div class="filters">
                <input type="text" id="search-input" placeholder="搜索...">
                <select id="category-filter">
                    <option value="">全部分类</option>
                    <option value="income">收入</option>
                    <option value="salary">工资</option>
                    <option value="utilities">水电</option>
                    <option value="other">其他</option>
                </select>
                <input type="month" id="month-filter">
            </div>
            <table class="transaction-table">
                <thead>
                    <tr>
                        <th>日期</th>
                        <th>描述</th>
                        <th>分类</th>
                        <th>类型</th>
                        <th>金额</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="transaction-list"></tbody>
            </table>
        </div>

        <!-- Add Transaction -->
        <div class="container" id="add" style="display:none;">
            <h1 id="form-title">添加交易</h1>
            <form id="transaction-form">
                <input type="hidden" id="edit-id" value="">
                <div class="form-group">
                    <label for="date">日期</label>
                    <input type="date" id="date" required>
                </div>
                <div class="form-group">
                    <label for="description">描述</label>
                    <input type="text" id="description" required>
                </div>
                <div class="form-group">
                    <label for="type">类型</label>
                    <select id="type" required>
                        <option value="income">收入</option>
                        <option value="expense">支出</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="category">分类</label>
                    <select id="category" required>
                        <option value="income">收入</option>
                        <option value="salary">工资</option>
                        <option value="utilities">水电</option>
                        <option value="other">其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="amount">金额 ($)</label>
                    <input type="number" id="amount" step="0.01" min="0.01" required>
                </div>
                <div class="form-group">
                    <label for="note">备注</label>
                    <textarea id="note" rows="3"></textarea>
                </div>
                <button type="submit" class="btn-primary">保存</button>
                <button type="reset" class="btn-secondary">重置</button>
            </form>
        </div>

        <!-- Reports -->
        <div class="container" id="reports" style="display:none;">
            <h1>统计报表</h1>
            <div class="filters">
                <input type="month" id="report-month">
                <button id="generate-report" class="btn-primary">生成报表</button>
            </div>
            <div class="report-container">
                <canvas id="report-chart"></canvas>
                <div id="report-data"></div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
</body>
</html>
